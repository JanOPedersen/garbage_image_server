services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: litter-api-debug

    ports:
      - "8000:5000"
      - "5678:5678"

    environment:
      LOG_LEVEL: DEBUG
      DEVICE: cpu
      DEFAULT_MODEL_ID: cigarette-butt-v1
      MODEL_MANIFEST_DIR: models/manifests
      MAX_CONTENT_LENGTH: 8388608
      PYTHONUNBUFFERED: "1"
      PYDEVD_DISABLE_FILE_VALIDATION: "1"
      FLASK_RUN_HOST: "0.0.0.0"
      FLASK_RUN_PORT: "5000"
      FLASK_DEBUG: "false"

    volumes:
      - .:/app

    working_dir: /app
    command: >
      python -Xfrozen_modules=off -m debugpy
      --listen 0.0.0.0:5678
      --wait-for-client
      run.py